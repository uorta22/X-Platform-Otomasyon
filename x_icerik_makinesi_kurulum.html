<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X İçerik Makinesi — Kurulum Kılavuzu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }

  .header {
    padding: 0 0 1.25rem;
    border-bottom: 1px solid #e0e0dc;
    margin-bottom: 1.5rem;
  }
  .header h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; }

  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .prog-dot { width: 32px; height: 5px; border-radius: 3px; background: #ddd; cursor: pointer; transition: background 0.2s; }
  .prog-dot.active { background: #378ADD; }
  .prog-dot.done { background: #1D9E75; }
  .prog-dot:hover { background: #378ADD; opacity: 0.7; }

  .step-card {
    background: #fff;
    border: 1px solid #e0e0dc;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid #f0f0ec;
    background: #fafafa;
  }
  .step-num {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
    background: #E6F1FB; color: #0C447C;
  }
  .step-title { font-size: 15px; font-weight: 600; color: #111; }
  .step-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .step-badge {
    margin-left: auto; font-size: 11px;
    padding: 3px 10px; border-radius: 20px; font-weight: 500; flex-shrink: 0;
  }
  .badge-free { background: #E1F5EE; color: #085041; }
  .badge-paid { background: #FAEEDA; color: #633806; }
  .badge-req  { background: #FCEBEB; color: #791F1F; }
  .badge-new  { background: #EEEDFE; color: #3C3489; }

  .step-body { padding: 1.25rem; }

  .visual-block {
    background: #f7f7f5;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e8e4;
  }

  .terminal {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1rem;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  }
  .terminal .cmd  { color: #e8e8e8; font-size: 12px; }
  .terminal .out  { color: #888; font-size: 11px; margin-top: 4px; }
  .terminal .comment { color: #7F77DD; font-size: 11px; margin-top: 6px; font-style: italic; }
  .terminal .green { color: #5DCAA5; font-size: 12px; }

  .steps-list { list-style: none; }
  .steps-list li {
    display: flex; gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #f0f0ec;
    font-size: 13px; color: #222; line-height: 1.55;
  }
  .steps-list li:last-child { border-bottom: none; }
  .step-icon {
    width: 20px; height: 20px; border-radius: 50%;
    background: #E6F1FB; color: #0C447C;
    font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }

  .warn-box {
    display: flex; gap: 8px;
    background: #FAEEDA; border-radius: 8px;
    padding: 10px 12px; margin-top: 10px;
    font-size: 12px; color: #633806; line-height: 1.55;
  }
  .info-box {
    display: flex; gap: 8px;
    background: #E6F1FB; border-radius: 8px;
    padding: 10px 12px; margin-top: 10px;
    font-size: 12px; color: #0C447C; line-height: 1.55;
  }
  .purple-box {
    display: flex; gap: 8px;
    background: #EEEDFE; border-radius: 8px;
    padding: 10px 12px; margin-top: 10px;
    font-size: 12px; color: #3C3489; line-height: 1.55;
  }

  .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
  .mini-card { background: #f7f7f5; border-radius: 8px; padding: 10px 12px; border: 1px solid #e8e8e4; }
  .mini-card .mc-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .mini-card .mc-val   { font-size: 15px; font-weight: 600; color: #111; }

  .prompt-pill {
    display: inline-block;
    background: #EEEDFE; color: #3C3489;
    font-size: 11px; padding: 4px 10px;
    border-radius: 20px; margin: 3px 3px 3px 0;
    border: 1px solid #AFA9EC;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .nav-row {
    display: flex; gap: 8px;
    margin-top: 1.5rem;
    justify-content: space-between; align-items: center;
  }
  .nav-btn {
    padding: 9px 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border-radius: 8px;
    border: 1px solid #ccc; background: #fff; color: #333;
    transition: background 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: #f5f5f3; }
  .nav-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .nav-btn.primary:hover:not(:disabled) { background: #0C447C; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .step-counter { font-size: 13px; color: #888; }

  code {
    font-size: 11px; background: #f0f0ec;
    padding: 1px 5px; border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .sec-label {
    font-size: 11px; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  svg { display: block; }
</style>
</head>

    <span class="step-counter" id="stepCounter"></span>

let current = 0;

function renderProgress() {
  document.getElementById('progressBar').innerHTML = steps.map((s, i) => {
    let cls = i < current ? 'done' : i === current ? 'active' : '';
    return `<div class="prog-dot ${cls}" onclick="goTo(${i})" title="${s.title}"></div>`;
  }).join('');
}

function renderStep() {
  const s = steps[current];
  const badgeHtml = s.badge ? `<span class="step-badge ${s.badgeClass}">${s.badge}</span>` : '';
  document.getElementById('stepContent').innerHTML = `
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">${s.num}</div>
        <div>
          <div class="step-title">${s.title}</div>
          <div class="step-sub">${s.sub}</div>
        </div>
        ${badgeHtml}
      </div>
      ${s.content()}
    </div>`;
  document.getElementById('stepCounter').textContent = `${current + 1} / ${steps.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = current === steps.length - 1 ? 'Tamamlandı ✓' : 'Sonraki →';
  nextBtn.disabled = false;
  renderProgress();
}

function navigate(dir) {
  if (dir === 1 && current < steps.length - 1) current++;
  else if (dir === -1 && current > 0) current--;
  renderStep();
}

function goTo(i) { current = i; renderStep(); }

renderStep();
